    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Kombat CSS Edition</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Arena de Luta */
        #arena {
            position: relative;
            width: 800px;
            height: 400px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://wallpaperaccess.com/full/2237889.jpg');
            background-size: cover;
            border: 4px solid #444;
            overflow: hidden;
        }

        /* Barra de Vida e HUD */
        .hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }

        .health-bar {
            width: 300px;
            height: 30px;
            background: #333;
            border: 2px solid #fff;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(to bottom, #ffeb3b, #f44336);
            width: 100%; /* Representa vida cheia */
            transition: width 0.3s;
        }

        .timer {
            color: #fff;
            font-size: 30px;
            text-shadow: 2px 2px #000;
        }

        /* Personagens (Placeholders Estilizados) */
        .fighter {
            position: absolute;
            bottom: 20px;
            width: 80px;
            height: 150px;
            animation: idle 0.6s infinite alternate ease-in-out;
        }

        #p1 { 
            left: 100px; 
            background: #2196f3; /* Azul para Sub-Zero */
            box-shadow: 0 0 20px rgba(33, 150, 243, 0.5);
            border-radius: 10px 10px 0 0;
        }

        #p2 { 
            right: 100px; 
            background: #ff9800; /* Amarelo para Scorpion */
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
            border-radius: 10px 10px 0 0;
            transform: scaleX(-1);
        }

        /* Animação de "Respiração" (Idle) */
        @keyframes idle {
            from { transform: scaleY(1); }
            to { transform: scaleY(1.05) translateY(-5px); }
        }

        /* Mensagem de Fight */
        .fight-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f44336;
            font-size: 80px;
            font-style: italic;
            text-shadow: 4px 4px #000;
            animation: fadeOut 2s forwards;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(2); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="arena">
        <div class="hud">
            <div class="health-bar"><div class="health-fill" style="width: 85%;"></div></div>
            <div class="timer">99</div>
            <div class="health-bar"><div class="health-fill"></div></div>
        </div>

        <div class="fight-text">FIGHT!</div>

        <div id="p1" class="fighter"></div>
        <div id="p2" class="fighter"></div>
    </div>

</body>
</html>
