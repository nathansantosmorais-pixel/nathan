<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Invasão Espacial - Rocket Game</title>
    <style>
        body {
            margin: 0;
            background: #020205;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-screen {
            position: relative;
            width: 500px;
            height: 700px;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            border: 4px solid #333;
            overflow: hidden;
        }

        /* Foguete Jogador */
        .player {
            position: absolute;
            width: 40px;
            height: 50px;
            background: #00d4ff;
            clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
            bottom: 20px;
            left: 230px;
            transition: transform 0.1s;
        }

        /* Tiro */
        .bullet {
            position: absolute;
            width: 4px;
            height: 15px;
            background: #ffff00;
            box-shadow: 0 0 10px #ffff00;
        }

        /* Inimigo */
        .enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #ff4d4d;
            clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%);
            border-radius: 5px;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.2rem;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="ui">Pontos: <span id="score">0</span></div>
        <div id="player" class="player"></div>
    </div>

<script>
    const screen = document.getElementById('game-screen');
    const player = document.getElementById('player');
    const scoreDisplay = document.getElementById('score');

    let score = 0;
    let playerX = 230;
    const playerSpeed = 7;
    let keys = {};

    // Listas para gerenciar objetos
    let bullets = [];
    let enemies = [];

    // Captura teclas pressionadas
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);

    // Função para criar tiros
    function shoot() {
        const b = document.createElement('div');
        b.classList.add('bullet');
        b.style.left = (playerX + 18) + 'px';
        b.style.bottom = '70px';
        screen.appendChild(b);
        bullets.push({ el: b, y: 70 });
    }

    // Criar inimigos periodicamente
    setInterval(() => {
        const e = document.createElement('div');
        e.classList.add('enemy');
        e.style.left = Math.random() * (500 - 40) + 'px';
        e.style.top = '-50px';
        screen.appendChild(e);
        enemies.push({ el: e, y: -50 });
    }, 1000);

    // Permitir tiro com Espaço
    document.addEventListener('keydown', e => {
        if (e.code === 'Space') shoot();
    });

    // Loop Principal do Jogo
    function update() {
        // Movimento do Jogador
        if (keys['ArrowLeft'] && playerX > 0) playerX -= playerSpeed;
        if (keys['ArrowRight'] && playerX < 460) playerX += playerSpeed;
        player.style.left = playerX + 'px';

        // Atualizar Tiros
        bullets.forEach((bullet, bIndex) => {
            bullet.y += 10;
            bullet.el.style.bottom = bullet.y + 'px';

            // Remover tiro
