<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Missão Espacial - Jogo de Foguete</title>
    <style>
        body {
            margin: 0;
            background: #050510;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            border: 2px solid #333;
            background: linear-gradient(to bottom, #000 0%, #050520 100%);
            overflow: hidden;
        }

        #rocket {
            position: absolute;
            bottom: 20px;
            left: 175px;
            width: 50px;
            height: 80px;
            background: #f0f0f0;
            clip-path: polygon(50% 0%, 100% 70%, 80% 100%, 20% 100%, 0% 70%);
            transition: left 0.1s ease-out;
            box-shadow: 0 10px 20px rgba(255, 69, 0, 0.5);
        }

        /* Fogo do motor */
        #rocket::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 25%;
            width: 50%;
            height: 20px;
            background: orange;
            border-radius: 50%;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            from { transform: scaleY(1); opacity: 0.8; }
            to { transform: scaleY(1.5); opacity: 1; }
        }

        .obstacle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #888;
            border-radius: 10px;
        }

        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">Pontos: 0</div>
        <div id="rocket"></div>
    </div>

    <script>
        const rocket = document.getElementById('rocket');
        const container = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        
        let rocketX = 175;
        let score = 0;
        let gameActive = true;

        // Movimento do foguete (Teclado)
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            
            if (e.key === 'ArrowLeft' && rocketX > 0) {
                rocketX -= 25;
            } else if (e.key === 'ArrowRight' && rocketX < 350) {
                rocketX += 25;
            }
            rocket.style.left = rocketX + 'px';
        });

        // Criar obstáculos (Asteroides)
        function createObstacle() {
            if (!gameActive) return;

            const obstacle = document.createElement('div');
            obstacle.classList.add('obstacle');
            obstacle.style.left = Math.floor(Math.random() * 360) + 'px';
            obstacle.style.top = '-50px';
            container.appendChild(obstacle);

            let obstacleY = -50;
            const fallInterval = setInterval(() => {
                obstacleY += 5;
                obstacle.style.top = obstacleY + 'px';

                // Checar colisão
                if (obstacleY > 500 && obstacleY < 580) {
                    let obsX = parseInt(obstacle.style.left);
                    if (obsX > rocketX - 30 && obsX < rocketX + 40) {
                        gameOver();
                    }
                }

                // Remover obstáculo e pontuar
                if (obstacleY > 600) {
                    clearInterval(fallInterval);
                    container.removeChild(obstacle);
                    score++;
                    scoreElement.innerText = `Pontos: ${score}`;
                }

                if (!gameActive) clearInterval(fallInterval);
            }, 20);
        }

        function gameOver() {
            gameActive = false;
            alert(`GAME OVER! Sua pontuação: ${score}`);
            location.reload(); // Recarrega a página para reiniciar
        }

        // Gera um obstáculo a cada 1.5 segundos
        setInterval(createObstacle, 1500);
    </script>
</body>
</html>
