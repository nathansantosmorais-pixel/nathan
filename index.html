<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Shooter - Sobrevivência</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">Pontos: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;

        // Configurações do Jogador
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            color: '#3498db',
            speed: 5
        };

        const keys = {};
        const bullets = [];
        const zombies = [];

        // Input de teclado
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Atirar
        window.addEventListener('mousedown', (e) => {
            if (!gameActive) return;
            const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 10,
                vy: Math.sin(angle) * 10,
                radius: 5
            });
        });

        // Criar Zumbis
        function spawnZombie() {
            if (!gameActive) return;
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - 30 : canvas.width + 30;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - 30 : canvas.height + 30;
            }
            zombies.push({ x, y, size: 30, speed: 2 });
            setTimeout(spawnZombie, Math.max(500, 2000 - score * 10)); // Dificuldade aumenta
        }

        function update() {
            if (!gameActive) return;

            // Movimento do Jogador
            if (keys['KeyW'] && player.y > 0) player.y -= player.speed;
            if (keys['KeyS'] && player.y < canvas.height) player.y += player.speed;
            if (keys['KeyA'] && player.x > 0) player.x -= player.speed;
            if (keys['KeyD'] && player.x < canvas.width) player.x += player.speed;

            // Atualizar Balas
            bullets.forEach((bullet, bIndex) => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(bIndex, 1);
                }
            });

            // Atualizar Zumbis
            zombies.forEach((zombie, zIndex) => {
                const angle = Math.atan2(player.y - zombie.y, player.x - zombie.x);
                zombie.x += Math.cos(angle) * zombie.speed;
                zombie.y += Math.sin(angle) * zombie.speed;

                // Colisão Zumbi vs Jogador
                const dist = Math.hypot(player.x - zombie.x, player.y - zombie.y);
                if (dist < player.radius + zombie.size / 2) {
                    gameActive = false;
                    alert("Gamer Over! Você fez " + score + " pontos.");
                    location.reload();
                }

                // Colisão Zumbi vs Bala
                bullets.forEach((bullet, bIndex) => {
                    const distBala = Math.hypot(bullet.x - zombie.x, bullet.y - zombie.y);
                    if (distBala < bullet.radius + zombie.size / 2) {
                        zombies.splice(zIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        scoreElement.innerText = score;
                    }
                });
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(26, 26, 26, 0.3)'; // Efeito de rastro
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar Jogador
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();

            // Desenhar Balas
            ctx.fillStyle = '#f1c40f';
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Desenhar Zumbis
            ctx.fillStyle = '#2ecc71';
            zombies.forEach(zombie => {
                ctx.fillRect(zombie.x - zombie.size/2, zombie.y - zombie.size/2, zombie.size, zombie.size);
            });

            update();
            requestAnimationFrame(draw);
        }

        spawnZombie();
        draw();
    </script>
</body>
</html>
