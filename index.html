<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fundo Sistema Solar</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="solarSystem"></canvas>

<script>
    const canvas = document.getElementById('solarSystem');
    const ctx = canvas.getContext('2d');

    let width, height;
    const planets = [];
    const stars = [];

    // Configurações dos planetas (distância, raio, velocidade, cor)
    const planetConfig = [
        { dist: 60, radius: 4, speed: 0.04, color: '#A5A5A5' }, // Mercúrio
        { dist: 90, radius: 7, speed: 0.02, color: '#E3BB76' }, // Vênus
        { dist: 130, radius: 8, speed: 0.015, color: '#2271B3' }, // Terra
        { dist: 170, radius: 6, speed: 0.01, color: '#E27B58' }, // Marte
        { dist: 240, radius: 15, speed: 0.005, color: '#D39C7E' } // Júpiter
    ];

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;

        // Gerar estrelas de fundo
        stars.length = 0;
        for (let i = 0; i < 400; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.5,
                opacity: Math.random()
            });
        }

        // Inicializar ângulos dos planetas
        planets.length = 0;
        planetConfig.forEach(p => {
            planets.push({ ...p, angle: Math.random() * Math.PI * 2 });
        });
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);

        // Desenhar Estrelas
        ctx.fillStyle = "white";
        stars.forEach(s => {
            ctx.globalAlpha = s.opacity;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        const centerX = width / 2;
        const centerY = height / 2;

        // Desenhar Sol
        ctx.beginPath();
        ctx.arc(centerX, centerY, 25, 0, Math.PI * 2);
        ctx.shadowBlur = 30;
        ctx.shadowColor = "yellow";
        ctx.fillStyle = "#FFD700";
        ctx.fill();
        ctx.shadowBlur = 0;

        // Desenhar Órbitas e Planetas
        planets.forEach(p => {
            // Órbita
            ctx.beginPath();
            ctx.arc(centerX, centerY, p.dist, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctx.stroke();

            // Posição do Planeta
            const px = centerX + Math.cos(p.angle) * p.dist;
            const py = centerY + Math.sin(p.angle) * p.dist;

            ctx.beginPath();
            ctx.arc(px, py, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();

            // Atualizar ângulo para o próximo frame
            p.angle += p.speed;
        });

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init();
    draw();
</script>

</body>
</html>
