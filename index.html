<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Shooter - Com Sistema de Vida</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #health-container {
            width: 200px;
            height: 20px;
            background: #444;
            border: 2px solid #fff;
            margin-top: 10px;
        }
        #health-bar {
            width: 100%;
            height: 100%;
            background: #ff4757;
            transition: width 0.2s;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Pontos: <span id="score">0</span></div>
        <div id="health-container"><div id="health-bar"></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const healthBar = document.getElementById('health-bar');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            color: '#3498db',
            speed: 5,
            hp: 100, // Vida máxima
            maxHp: 100
        };

        const bullets = [];
        const zombies = [];
        const keys = {};

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        window.addEventListener('mousedown', (e) => {
            if (!gameActive) return;
            const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 12,
                vy: Math.sin(angle) * 12,
                radius: 5
            });
        });

        function spawnZombie() {
            if (!gameActive) return;
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -30 : canvas.width + 30;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -30 : canvas.height + 30;
            }
            // Zumbis agora têm velocidade variada
            zombies.push({ x, y, size: 30, speed: 1.5 + Math.random() });
            setTimeout(spawnZombie, Math.max(400, 1500 - score * 5));
        }

        function update() {
            if (!gameActive) return;

            if (keys['KeyW'] && player.y > 0) player.y -= player.speed;
            if (keys['KeyS'] && player.y < canvas.height) player.y += player.speed;
            if (keys['KeyA'] && player.x > 0) player.x -= player.speed;
            if (keys['KeyD'] && player.x < canvas.width) player.x += player.speed;

            bullets.forEach((bullet, bIndex) => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(bIndex, 1);
                }
            });

            zombies.forEach((zombie, zIndex) => {
                const angle = Math.atan2(player.y - zombie.y, player.x - zombie.x);
                zombie.x += Math.cos(angle) * zombie.speed;
                zombie.y += Math.sin(angle) * zombie.speed;

                // COLISÃO COM JOGADOR (Dano por tempo)
                const dist = Math.hypot(player.x - zombie.x, player.y - zombie.y);
                if (dist < player.radius + zombie.size / 2) {
                    player.hp -= 0.5; // Perde vida enquanto encosta
                    healthBar.style.width = (player.hp / player.maxHp * 100) + "%";
                    
                    if (player.hp <= 0) {
                        gameActive = false;
                        alert("Fim de Jogo! Você sobreviveu o bastante para fazer " + score + " pontos.");
                        location.reload();
                    }
                }

                bullets.forEach((bullet, bIndex) => {
                    const distBala = Math.hypot(bullet.x - zombie.x, bullet.y - zombie.y);
                    if (distBala < bullet.radius + zombie.size / 2) {
                        zombies.splice(zIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        scoreElement.innerText = score;
                    }
                });
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(26, 26, 26, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Jogador
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0; // Reset sombra para outros elementos

            // Balas
            ctx.fillStyle = '#fffa65';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Zumbis
            ctx.fillStyle = '#2ecc71';
            zombies.forEach(z => {
                ctx.fillRect(z.x - z.size/2, z.y - z.size/2, z.size, z.size);
            });

            update();
            requestAnimationFrame(draw);
        }

        spawnZombie();
        draw();
    </script>
</body>
</html>
