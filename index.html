<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Duelo Espacial: Foguete vs IA</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        }
        
        /* Estilo dos Foguetes */
        .ship {
            position: absolute;
            width: 40px;
            height: 40px;
            transition: transform 0.1s;
        }

        #player { background: #00f2ff; clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%); }
        #enemy { background: #ff0055; clip-path: polygon(50% 100%, 100% 0%, 50% 20%, 0% 0%); }

        /* Tiros */
        .bullet {
            position: absolute;
            width: 4px;
            height: 15px;
            border-radius: 2px;
        }
        .player-bullet { background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        .enemy-bullet { background: #ff0055; box-shadow: 0 0 10px #ff0055; }

        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">Jogador: <span id="p-score">0</span> | Inimigo: <span id="e-score">0</span></div>
    <div id="player" class="ship"></div>
    <div id="enemy" class="ship"></div>
</div>

<script>
    const container = document.getElementById('game-container');
    const playerEl = document.getElementById('player');
    const enemyEl = document.getElementById('enemy');
    
    let pScore = 0, eScore = 0;
    
    // Estados iniciais
    let player = { x: window.innerWidth/2, y: window.innerHeight - 80, speed: 8 };
    let enemy = { x: window.innerWidth/2, y: 50, speed: 4 };
    let keys = {};
    let bullets = [];

    // Controles
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function createBullet(x, y, isPlayer) {
        const b = document.createElement('div');
        b.className = `bullet ${isPlayer ? 'player-bullet' : 'enemy-bullet'}`;
        b.style.left = x + 18 + 'px';
        b.style.top = y + 'px';
        container.appendChild(b);
        bullets.push({ el: b, x: x + 18, y: y, player: isPlayer });
    }

    // Atirar automaticamente
    setInterval(() => createBullet(player.x, player.y - 20, true), 400);
    setInterval(() => createBullet(enemy.x, enemy.y + 40, false), 600);

    function update() {
        // Movimento Jogador
        if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < window.innerWidth - 40) player.x += player.speed;
